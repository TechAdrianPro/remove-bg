<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remove BG</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Toolbar -->
  <header class="toolbar">
    <div class="toolbar-left">
      <span class="logo">Remove <span class="logo-accent">BG</span></span>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-ghost" id="btn-new" hidden>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Nowe zdjęcie
      </button>
      <button class="btn btn-ghost" id="btn-background" hidden>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        Tło
      </button>
      <button class="btn btn-ghost" id="btn-crop" hidden>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v4m0 12v4M2 6h4m12 0h4M6 18h12a2 2 0 0 0 2-2V6"/></svg>
        Kadruj
      </button>
      <button class="btn btn-ghost" id="btn-eraser" hidden>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
        Gumka
      </button>
      <button class="btn btn-accent" id="btn-download" hidden>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Pobierz
      </button>
    </div>
  </header>

  <!-- Main content area -->
  <main class="canvas-area" id="canvas-area">
    <!-- Drop zone (visible by default) -->
    <div class="dropzone" id="dropzone">
      <div class="dropzone-content">
        <div class="dropzone-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
        </div>
        <h2 class="dropzone-title">Przeciągnij zdjęcie tutaj</h2>
        <p class="dropzone-subtitle">lub kliknij, aby wybrać plik</p>
        <p class="dropzone-formats">JPEG, PNG, WebP &bull; max 20 MB</p>
      </div>
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" hidden>
    </div>

    <!-- Processing state (hidden) -->
    <div class="processing" id="processing" hidden>
      <div class="spinner"></div>
      <p class="processing-text" id="processing-text">Analizowanie zdjęcia...</p>
    </div>

    <!-- Result state (hidden) -->
    <div class="result" id="result" hidden>
      <div class="result-viewport" id="result-viewport">
        <canvas id="canvas-before" class="result-canvas"></canvas>
        <div class="result-after-clip" id="result-after-clip">
          <canvas id="canvas-after" class="result-canvas"></canvas>
        </div>
        <div class="slider-handle" id="slider-handle">
          <div class="slider-line"></div>
          <div class="slider-grip">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6l-4 6 4 6M16 6l4 6-4 6"/></svg>
          </div>
        </div>
        <div class="slider-label slider-label-left">Przed</div>
        <div class="slider-label slider-label-right">Po</div>
      </div>
    </div>
  </main>

  <!-- Side panel (hidden) -->
  <aside class="side-panel" id="side-panel" hidden>
    <div class="panel-header">
      <h3 class="panel-title" id="panel-title"></h3>
      <button class="btn btn-ghost panel-close" id="panel-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/toast.js"></script>
  <script src="js/slider.js"></script>
  <script src="js/processor.js"></script>
  <script src="js/background.js"></script>
  <script src="js/crop.js"></script>
  <script src="js/eraser.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
